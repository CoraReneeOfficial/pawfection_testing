<div id="ai-chat-widget" class="ai-chat-widget" x-data="{ open: false, minimizing: false }" :class="{ 'open': open, 'minimized': minimizing }">
    <!-- Floating Action Button -->
    <button class="ai-fab" @click="open = !open; minimizing = false" aria-label="Pawfection AI Assistant">
        <span x-show="!open">✨ AI Help</span>
        <span x-show="open">&times;</span>
    </button>

    <!-- Chat Window -->
    <div class="ai-chat-window" x-show="open" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 translate-y-4">
        <div class="ai-chat-header">
            <h3>Pawfection AI</h3>
            <div class="ai-chat-controls">
                <button @click="clearChat()" class="new-chat-btn" title="New Chat">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2Z"/>
                    </svg>
                    New Chat
                </button>
                <button @click="open = false; minimizing = true" class="minimize-btn" title="Minimize">_</button>
            </div>
        </div>

        <div class="ai-chat-messages" id="ai-messages">
            <div class="message ai-message">
                Hello! I'm your Pawfection assistant. How can I help you today?
                <br><br>
                Try asking:
                <ul>
                    <li>"Book a bath for Rex tomorrow"</li>
                    <li>"Add a new owner named Sarah"</li>
                    <li>"Show me today's schedule"</li>
                </ul>
                <button type="button" class="speaker-btn" onclick="toggleSpeechSynthesis(this)" aria-label="Read message aloud" title="Read message aloud">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M11.536 14.01A8.473 8.473 0 0 0 14.026 8a8.473 8.473 0 0 0-2.49-6.01l-.708.707A7.476 7.476 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303l.708.707z"/>
                      <path d="M10.121 12.596A6.48 6.48 0 0 0 12.025 8a6.48 6.48 0 0 0-1.904-4.596l-.707.707A5.483 5.483 0 0 1 11.025 8a5.483 5.483 0 0 1-1.61 3.89l.706.706z"/>
                      <path d="M8.707 11.182A4.486 4.486 0 0 0 10.025 8a4.486 4.486 0 0 0-1.318-3.182L8 5.525A3.489 3.489 0 0 1 9.025 8 3.49 3.49 0 0 1 8 10.475l.707.707zM6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06z"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="ai-chat-input-area">
            <button type="button" id="ai-mic-btn" class="mic-btn" onclick="toggleSpeechRecognition()" aria-label="Voice input" title="Start voice input">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z"/>
                  <path d="M10 8a2 2 0 1 1-4 0V3a2 2 0 1 1 4 0v5zM8 0a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V3a3 3 0 0 0-3-3z"/>
                </svg>
            </button>
            <textarea id="ai-user-input" placeholder="Type your request..." rows="1" @keydown.enter.prevent="sendMessage()"></textarea>
            <button class="send-btn" @click="sendMessage()" aria-label="Send message">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576 6.636 10.07Zm6.787-8.201L1.591 6.602l4.339 2.76 7.494-7.493Z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<style>
    .ai-chat-widget {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        z-index: 9999;
        font-family: 'Inter', sans-serif;
    }

    .ai-fab {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        border: none;
        border-radius: 50px;
        padding: 0.8rem 1.5rem;
        font-weight: 600;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .ai-fab:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(99, 102, 241, 0.5);
    }

    .ai-chat-window {
        position: absolute;
        bottom: 4rem;
        right: 0;
        width: 350px;
        height: 500px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid #e5e7eb;
    }

    .ai-chat-header {
        background: #f9fafb;
        padding: 1rem;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .ai-chat-header h3 {
        margin: 0;
        font-size: 1rem;
        color: #111827;
        font-weight: 600;
    }

    .ai-chat-controls {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .new-chat-btn {
        background: none;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        padding: 0.2rem 0.5rem;
        font-size: 0.75rem;
        color: #4b5563;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.25rem;
        transition: background 0.2s;
    }

    .new-chat-btn:hover {
        background: #f3f4f6;
    }

    .minimize-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.2rem;
        color: #6b7280;
    }

    .ai-chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        background: #fff;
    }

    .message {
        max-width: 85%;
        padding: 0.75rem 1rem;
        border-radius: 12px;
        font-size: 0.9rem;
        line-height: 1.5;
    }

    .ai-message {
        background: #f3f4f6;
        color: #1f2937;
        align-self: flex-start;
        border-bottom-left-radius: 2px;
        position: relative;
    }

    .speaker-btn {
        background: none;
        border: none;
        color: #9ca3af;
        cursor: pointer;
        padding: 4px;
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        transition: color 0.2s, background 0.2s;
    }

    .speaker-btn:hover {
        background: #e5e7eb;
        color: #4b5563;
    }

    .speaker-btn.speaking {
        color: #6366f1;
        animation: pulse-indigo 1.5s infinite;
    }

    @keyframes pulse-indigo {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
        70% { transform: scale(1.05); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
    }

    .ai-message a {
        color: #6366f1;
        font-weight: 500;
        text-decoration: underline;
    }

    .ai-message ul {
        margin: 0.5rem 0 0 1.2rem;
        padding: 0;
    }

    .user-message {
        background: #6366f1;
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 2px;
    }

    .ai-chat-input-area {
        padding: 1rem;
        border-top: 1px solid #e5e7eb;
        display: flex;
        gap: 0.5rem;
        background: #fff;
    }

    #ai-user-input {
        flex: 1;
        border: 1px solid #d1d5db;
        border-radius: 20px;
        padding: 0.6rem 1rem;
        font-size: 0.9rem;
        resize: none;
        outline: none;
        font-family: inherit;
    }

    #ai-user-input:focus {
        border-color: #6366f1;
    }

    .mic-btn {
        background: none;
        color: #6b7280;
        border: none;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: color 0.2s, background 0.2s;
        flex-shrink: 0;
    }

    .mic-btn:hover {
        background: #f3f4f6;
        color: #4f46e5;
    }

    .mic-btn.recording {
        color: #ef4444;
        animation: pulse-red 1.5s infinite;
    }

    @keyframes pulse-red {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
        70% { transform: scale(1.05); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    .send-btn {
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s;
    }

    .send-btn:hover {
        background: #4f46e5;
    }

    /* Loading Indicator */
    .typing-indicator span {
        display: inline-block;
        width: 6px;
        height: 6px;
        background-color: #9ca3af;
        border-radius: 50%;
        animation: typing 1.4s infinite ease-in-out both;
        margin: 0 2px;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes typing {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
    }
</style>

<script>
    let chatHistory = [];

    // Load history on mount
    document.addEventListener('DOMContentLoaded', () => {
        const savedHistory = sessionStorage.getItem('pawfection_ai_history');
        if (savedHistory) {
            try {
                const history = JSON.parse(savedHistory);
                if (history && history.length > 0) {
                    // Clear default welcome message
                    document.getElementById('ai-messages').innerHTML = '';
                    chatHistory = history;
                    history.forEach(msg => {
                        addMessageToUI(msg.text, msg.role === 'user' ? 'user' : 'ai', msg.role === 'model'); // Model responses can be HTML
                    });
                }
            } catch (e) {
                console.error("Failed to parse chat history");
            }
        }
    });

    function saveHistory() {
        sessionStorage.setItem('pawfection_ai_history', JSON.stringify(chatHistory));
    }

    function clearChat() {
        chatHistory = [];
        sessionStorage.removeItem('pawfection_ai_history');
        const messagesDiv = document.getElementById('ai-messages');
        messagesDiv.innerHTML = `
            <div class="message ai-message">
                Hello! I'm your Pawfection assistant. How can I help you today?
                <br><br>
                Try asking:
                <ul>
                    <li>"Book a bath for Rex tomorrow"</li>
                    <li>"Add a new owner named Sarah"</li>
                    <li>"Show me today's schedule"</li>
                </ul>
                <button type="button" class="speaker-btn" onclick="toggleSpeechSynthesis(this)" aria-label="Read message aloud" title="Read message aloud">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M11.536 14.01A8.473 8.473 0 0 0 14.026 8a8.473 8.473 0 0 0-2.49-6.01l-.708.707A7.476 7.476 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303l.708.707z"/>
                      <path d="M10.121 12.596A6.48 6.48 0 0 0 12.025 8a6.48 6.48 0 0 0-1.904-4.596l-.707.707A5.483 5.483 0 0 1 11.025 8a5.483 5.483 0 0 1-1.61 3.89l.706.706z"/>
                      <path d="M8.707 11.182A4.486 4.486 0 0 0 10.025 8a4.486 4.486 0 0 0-1.318-3.182L8 5.525A3.489 3.489 0 0 1 9.025 8 3.49 3.49 0 0 1 8 10.475l.707.707zM6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06z"/>
                    </svg>
                </button>
            </div>
        `;
    }

    function sendMessage() {
        const input = document.getElementById('ai-user-input');
        const message = input.value.trim();
        if (!message) return;

        // If history was empty, clear the default welcome message before adding user msg
        if (chatHistory.length === 0) {
            document.getElementById('ai-messages').innerHTML = '';
        }

        // Add user message
        addMessageToUI(message, 'user');
        chatHistory.push({ role: 'user', text: message });
        saveHistory();

        input.value = '';

        // Show loading
        const loadingId = addLoading();

        // Send to backend
        fetch('{{ url_for("ai_assistant.chat") }}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token() }}'
            },
            body: JSON.stringify({ message: message, history: chatHistory.slice(0, -1) }) // Send history excluding current msg
        })
        .then(response => response.json())
        .then(data => {
            removeLoading(loadingId);
            if (data.error) {
                addMessageToUI('Error: ' + data.error, 'ai');
            } else {
                addMessageToUI(data.response, 'ai', true);
                chatHistory.push({ role: 'model', text: data.response }); // Note: storing HTML response in history for now, text is fine since we display it as HTML anyway
                saveHistory();
            }
        })
        .catch(error => {
            removeLoading(loadingId);
            addMessageToUI('Sorry, something went wrong. Please check your connection.', 'ai');
            console.error('Error:', error);
        });
    }

    function addMessageToUI(text, sender, isHtml = false) {
        const messagesDiv = document.getElementById('ai-messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}-message`;

        if (isHtml) {
            msgDiv.innerHTML = text;
        } else {
            msgDiv.textContent = text;
        }

        if (sender === 'ai') {
            const speakerBtn = document.createElement('button');
            speakerBtn.type = 'button';
            speakerBtn.className = 'speaker-btn';
            speakerBtn.setAttribute('aria-label', 'Read message aloud');
            speakerBtn.setAttribute('title', 'Read message aloud');
            speakerBtn.onclick = function() { toggleSpeechSynthesis(this); };
            speakerBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M11.536 14.01A8.473 8.473 0 0 0 14.026 8a8.473 8.473 0 0 0-2.49-6.01l-.708.707A7.476 7.476 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303l.708.707z"/>
                  <path d="M10.121 12.596A6.48 6.48 0 0 0 12.025 8a6.48 6.48 0 0 0-1.904-4.596l-.707.707A5.483 5.483 0 0 1 11.025 8a5.483 5.483 0 0 1-1.61 3.89l.706.706z"/>
                  <path d="M8.707 11.182A4.486 4.486 0 0 0 10.025 8a4.486 4.486 0 0 0-1.318-3.182L8 5.525A3.489 3.489 0 0 1 9.025 8 3.49 3.49 0 0 1 8 10.475l.707.707zM6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06z"/>
                </svg>
            `;
            msgDiv.appendChild(speakerBtn);
        }

        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addLoading() {
        const messagesDiv = document.getElementById('ai-messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ai-message typing-indicator';
        msgDiv.id = 'ai-loading-' + Date.now();
        msgDiv.innerHTML = '<span></span><span></span><span></span>';
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return msgDiv.id;
    }

    function removeLoading(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    // Speech-to-Text Logic
    let recognition;
    let isRecording = false;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = function() {
            isRecording = true;
            document.getElementById('ai-mic-btn').classList.add('recording');
        };

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            const inputField = document.getElementById('ai-user-input');
            inputField.value += (inputField.value ? ' ' : '') + transcript;
            inputField.focus();
        };

        recognition.onerror = function(event) {
            console.error('Speech recognition error:', event.error);
            stopSpeechRecognition();
        };

        recognition.onend = function() {
            stopSpeechRecognition();
        };
    } else {
        console.warn("Speech Recognition API not supported in this browser.");
        // Optionally hide the mic button if not supported
        document.addEventListener('DOMContentLoaded', () => {
            const micBtn = document.getElementById('ai-mic-btn');
            if (micBtn) {
                micBtn.style.display = 'none';
            }
        });
    }

    function toggleSpeechRecognition() {
        if (!recognition) {
            alert("Speech recognition is not supported in your browser.");
            return;
        }

        if (isRecording) {
            recognition.stop();
        } else {
            try {
                recognition.start();
            } catch (e) {
                console.error("Error starting speech recognition:", e);
            }
        }
    }

    function stopSpeechRecognition() {
        isRecording = false;
        document.getElementById('ai-mic-btn').classList.remove('recording');
    }

    // Text-to-Speech Logic
    let currentUtterance = null;
    let currentlySpeakingBtn = null;

    function toggleSpeechSynthesis(btnElement) {
        if (!('speechSynthesis' in window)) {
            alert("Text-to-speech is not supported in your browser.");
            return;
        }

        const msgDiv = btnElement.closest('.message');
        if (!msgDiv) return;

        // If we click the currently speaking button, stop it
        if (window.speechSynthesis.speaking && currentlySpeakingBtn === btnElement) {
            window.speechSynthesis.cancel();
            btnElement.classList.remove('speaking');
            currentlySpeakingBtn = null;
            return;
        }

        // If something else is speaking, stop it first
        window.speechSynthesis.cancel();
        if (currentlySpeakingBtn) {
            currentlySpeakingBtn.classList.remove('speaking');
        }

        // Extract text content, clone to not mutate original
        const clone = msgDiv.cloneNode(true);
        // Remove the button from clone text
        const btnClone = clone.querySelector('.speaker-btn');
        if (btnClone) btnClone.remove();

        // Remove lists text nodes to avoid weird reading of bullet points sometimes, or just get innerText
        const textToRead = clone.innerText || clone.textContent;

        if (!textToRead.trim()) return;

        currentUtterance = new SpeechSynthesisUtterance(textToRead);
        currentUtterance.lang = 'en-US';
        currentUtterance.rate = 1.0;

        currentUtterance.onstart = function() {
            btnElement.classList.add('speaking');
            currentlySpeakingBtn = btnElement;
        };

        currentUtterance.onend = function() {
            btnElement.classList.remove('speaking');
            currentlySpeakingBtn = null;
        };

        currentUtterance.onerror = function() {
            btnElement.classList.remove('speaking');
            currentlySpeakingBtn = null;
        };

        window.speechSynthesis.speak(currentUtterance);
    }
</script>
